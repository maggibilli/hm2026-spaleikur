<style>
  /* ─────────────── Tokens ─────────────── */
  :root {
    --accent: #00FF80;
    --accent-ink: #04140C;          /* dökkur texti ofan á accent */
    --accent-glow: rgba(0, 255, 128, 0.35);

    --bg: #060D0A;
    --bg-2: #0A140F;
    --surface: #0F1C16;
    --surface-2: #142a20;
    --surface-3: #18342764;
    --line: rgba(0, 255, 128, 0.13);
    --line-soft: rgba(255, 255, 255, 0.07);

    --text: #EAF6EF;
    --text-dim: #A7BDB1;
    --muted: #6E857a;

    --live: #FF5247;
    --gold: #FFD24A;
    --silver: #CBD7D0;
    --bronze: #E0935A;

    --r-sm: 10px;
    --r: 16px;
    --r-lg: 22px;
    --r-xl: 30px;

    --font-display: "Anton", sans-serif;
    --font-ui: "Archivo", sans-serif;
    --shadow: 0 18px 50px -20px rgba(0,0,0,0.7);
    --maxw: 1180px;
  }

  /* Þema-afbrigði í gegnum tweaks */
  [data-theme="ink"] { --bg:#070A12; --bg-2:#0B0F1C; --surface:#101529; --surface-2:#1a2140; --line:rgba(120,150,255,.14); }
  [data-theme="stadium"] { --bg:#0c0a06; --bg-2:#14110a; --surface:#1b1710; --surface-2:#2a2417; --line:rgba(255,210,74,.14); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Bakgrunnsstemning: grænn ljómi + völlur-rúður */
  .bg-atmos {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(120% 80% at 80% -10%, var(--accent-glow), transparent 55%),
      radial-gradient(90% 70% at 0% 110%, rgba(0,255,128,0.10), transparent 60%);
    opacity: .8;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .35;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 46px 46px;
    -webkit-mask-image: radial-gradient(130% 100% at 50% 0%, #000 35%, transparent 80%);
            mask-image: radial-gradient(130% 100% at 50% 0%, #000 35%, transparent 80%);
  }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 99px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ─────────────── Typo helpers ─────────────── */
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: .01em; line-height: .92; text-transform: uppercase; }
  .num { font-family: var(--font-display); font-weight: 400; font-feature-settings: "tnum" 1; }
  .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }

  /* ─────────────── App layout ─────────────── */
  #root { position: relative; z-index: 1; }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
  }
  .main-col { min-width: 0; }
  .main-wrap { max-width: var(--maxw); margin: 0 auto; padding: 30px 34px 120px; }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .main-wrap { padding: 18px 16px 110px; }
  }

  /* Focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }

  /* Reusable card */
  .card {
    background: linear-gradient(180deg, var(--surface), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
  }

  .anim-in { animation: rise .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .anim-in { animation: none; } }

  .pop { animation: pop .28s cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes pop { from { transform: scale(.85); opacity:0; } to { transform: scale(1); opacity:1; } }
</style>
