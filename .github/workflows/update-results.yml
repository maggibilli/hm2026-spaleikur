name: Uppfæra HM2026 úrslit

on:
  schedule:
    - cron: "7,37 * * * *"   # tvisvar á klst (off-peak mínútur)
  workflow_dispatch: {}

# Aðeins ein keyrsla í einu
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sækja og uppfæra úrslit
        env:
          SUPABASE_BOT_TOKEN: ${{ secrets.SUPABASE_BOT_TOKEN }}
        run: node scripts/update-results.mjs
